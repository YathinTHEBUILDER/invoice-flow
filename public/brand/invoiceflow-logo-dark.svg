<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" width="180" height="44" fill="none">
  <g transform="translate(4, 2)">
    <!-- Brand Mark (Document + Arrow/Check + Wave) -->
    <!-- Purple wave -->
    <path d="M 4,26 C 2,26 1,32 5,32 C 10,32 12,28 15,22 L 18,17" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Document outline with folded corner -->
    <path d="M 12,12 H 24 L 28,16 V 34 C 28,35 27,36 26,36 H 12 C 11,36 10,35 10,34 V 14 C 10,13 11,12 12,12 Z" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Lines in document -->
    <path d="M 14,16 H 20" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
    <path d="M 14,20 H 18" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
    <!-- Green Checkmark Arrow -->
    <path d="M 12,28 L 18,32 L 32,14 M 28,14 H 32 V 18" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="46" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#0F172A" letter-spacing="-0.025em">Invoice<tspan fill="#0F172A" font-weight="500">Flow</tspan></text>
</svg>
